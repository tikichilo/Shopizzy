    <h1><span class="shop">Shop</span><span class="izzy">Izzy</span></h1>
  </div>    
  <nav>
    <ul>
      <li class="dropdown">
        <a href="#">☰</a>
        <div class="dropdown-content">
          <a href="cart.html" class="cart-link">Cart <span class="cart-dot" id="cartDot"></span></a>
          <a href="logout.php">Logout</a>

<div class="content-overlay">

  <section id="filter-buttons">
    <button onclick="filterProducts('all')">All</button>
    <button onclick="filterProducts('clothes')">Clothing</button>

<!-- Search Form -->

</form>

<!-- AI Summary Title -->
<h2 id="aiReply" class="ai-summary-text">Recommended for You</h2>

<!-- Horizontal Product Card Container -->
<div id="ai-recommendations-container">
  <!-- Example Product Card -->
  <div class="ai-product-card">
    <img src="your-image.jpg" alt="Product Image">
    <h4>Product Title</h4>
    <p>ZMW99</p>
    <small>AI Recommended</small>
    <button class="buy-btn">Add to Cart</button>
  </div>
  <!-- Repeat more .ai-product-card elements as needed -->
</div>



<div class="product-container" id="product-container">
  <!-- Products will be dynamically injected here -->
</div>

<script>
  // Load products and initialize
document.addEventListener("DOMContentLoaded", function () {
  fetch("addprod.php")
    .then(response => {
      if (!response.ok) throw new Error("Network error");
      return response.json();
    })
    .then(data => {
      const container = document.getElementById("product-container");
      container.innerHTML = "";

      // Access the products array inside the returned JSON
      let products = data.products;

      // Shuffle products to promote variety
      products = products.sort(() => Math.random() - 0.5);

      products.forEach(product => {
        let extra = "";
        if (product.category === "phones") {
          extra = `<p><strong>Brand:</strong> ${product.brand}</p>
                   <p><strong>Specs:</strong> ${product.specs}</p>`;
        } else if (product.category === "clothes") {
          extra = `<p><strong>Size:</strong> ${product.size}</p>
                   <p><strong>Color:</strong> ${product.color}</p>
                   <p><strong>Material:</strong> ${product.material}</p>`;
        } else if (product.category === "electronics") {
          extra = `<p><strong>Brand:</strong> ${product.brand}</p>
                   <p><strong>Warranty:</strong> ${product.warranty}</p>`;
        }

  // Tag badge if tag exists
let tagHTML = "";
if (product.tag && product.tag.trim() !== "") {
    tagHTML = `<div class="special-tag-badge">${product.tag}</div>`;
}

        container.innerHTML += `
          <div class="product ${product.category}" data-id="${product.id}" data-category="${product.category}" style="position: relative;">
            ${tagHTML}
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p class="price">ZMW ${product.price}</p>
            ${extra}
            <button class="buy-btn add-to-cart-btn" 
              data-id="${product.id}" 
              data-name="${product.name}" 
              data-price="${product.price}" 
              data-image="${product.image}">
              Add to Cart
            </button>
          </div>
        `;
      });


      // Bind Add to Cart and Product click listeners
      document.querySelectorAll('.add-to-cart-btn').forEach(button => {
        button.addEventListener('click', (e) => {
          e.stopPropagation(); // Prevent triggering parent click
          const id = button.dataset.id;
          const name = button.dataset.name;
          const price = parseFloat(button.dataset.price);
          const image = button.dataset.image;
          addToCart(name, price, id, image);

          const parentProduct = button.closest('.product');
          if (parentProduct) {
            const category = parentProduct.dataset.category;
            submitInteractionForm({ productId: parseInt(id), category, action: 'add_to_cart' });
          }
        });
      });

      document.querySelectorAll('.product').forEach(product => {
        const id = product.dataset.id;
        const category = product.dataset.category;
        product.addEventListener('click', () => {
          submitInteractionForm({ productId: parseInt(id), category, action: 'product_click' });
        });
      });
    })
    .catch(error => {
      console.error("Error fetching products:", error);
    });
});

// Product filtering
function filterProducts(category) {
  const products = document.querySelectorAll(".product");
  products.forEach(product => {
    product.style.display = (category === "all" || product.classList.contains(category)) ? "block" : "none";
  });
}

// Submit hidden form to iframe
function submitInteractionForm({ userId = 1, productId, category, action }) {
  const form = document.createElement('form');
  form.method = 'POST';
  form.action = 'log_event.php';
  form.target = 'hiddenFrame'; // submit to hidden iframe

  const fields = {
    user_id: userId,
    product_id: productId || '',
    category: category || '',
    action: action || '',
    timestamp: new Date().toISOString()
  };

  for (const key in fields) {
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = key;
    input.value = fields[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}
</script>

<!-- External scripts -->
<script src="main.js"></script>

<script src="events.js"></script>
<script>
  // Check URL for ?success=1
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('success') === '1') {
    // Create confirmation banner
    const banner = document.createElement('div');
    banner.style.position = 'fixed';
    banner.style.top = '20px';
    banner.style.left = '50%';
    banner.style.transform = 'translateX(-50%)';
    banner.style.backgroundColor = '#4CAF50';
    banner.style.color = 'white';
    banner.style.padding = '15px 30px';
    banner.style.fontSize = '18px';
    banner.style.borderRadius = '8px';
    banner.style.boxShadow = '0 2px 6px rgba(0,0,0,0.3)';
    banner.style.zIndex = '1000';
    banner.textContent = 'Payment successful! Thank you for your order.';

    document.body.appendChild(banner);

    // Remove banner after 5 seconds
    setTimeout(() => {
      banner.remove();
      // Optionally, remove the success param from URL without reload
      if (window.history.replaceState) {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
      }
    }, 5000);
  }
</script>

<!-- Modal Structure -->
<div id="imageModal">
  <span class="close-btn">&times;</span>
  <img id="modalImage" src="" alt="Enlarged product image">
</div>


</body>
