<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopizzy - Welcome</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            overflow: hidden;
            position: relative;
        }

        /* Enhanced Background Video */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translateX(-50%) translateY(-50%);
            opacity: 0.25;
            filter: blur(2px) contrast(1.3);
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffaa00;
            border-radius: 50%;
            animation: float 12s infinite linear;
            opacity: 0.6;
            box-shadow: 0 0 6px rgba(255, 170, 0, 0.8);
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Glass morphism overlay */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(15px);
            z-index: -1;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 170, 0, 0.25);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(255, 170, 0, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                inset 0 -1px 0 rgba(255, 170, 0, 0.1);
            max-width: 900px;
            width: 90%;
        }

        .eli {
            color: #ffffff;
            font-weight: 400;
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            margin-bottom: 20px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.95;
            position: relative;
            font-family: 'Inter', sans-serif;
        }

        .eli::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffaa00, #fbff00, #ffaa00, transparent);
            border-radius: 2px;
        }

        .ela {
            font-size: clamp(3.5rem, 9vw, 8rem);
            margin: 30px 0 40px 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            text-shadow: 0 0 40px rgba(255, 170, 0, 0.6);
        }

        .shop {
            color: #ffaa00;
            background: linear-gradient(45deg, #ffaa00, #fbff00, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 4s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(255, 170, 0, 0.7));
            position: relative;
        }

        @keyframes gradientShift {
            0%, 100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .shop::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, #ffaa00, #fbff00);
            opacity: 0.2;
            z-index: -1;
            filter: blur(25px);
            transform: scale(1.2);
        }

        .izzy {
            color: white;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            margin-left: 15px;
        }

        .button-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .button {
            padding: 20px 45px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 12px 35px rgba(0, 0, 0, 0.4),
                0 0 0 2px rgba(255, 170, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'Inter', sans-serif;
            min-width: 200px;
            backdrop-filter: blur(10px);
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .button:hover::before {
            left: 100%;
        }

        .user-button {
            background: linear-gradient(135deg, #ffaa00 0%, #fbff00 50%, #ffaa00 100%);
            color: #000000;
            font-weight: 700;
            transform: translateY(0);
            background-size: 200% 200%;
            animation: subtleGlow 3s ease-in-out infinite;
        }

        .admin-button {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.9) 0%, rgba(251, 255, 0, 0.9) 50%, rgba(255, 170, 0, 0.9) 100%);
            color: #ffffff;
            font-weight: 700;
            transform: translateY(0);
            border: 2px solid rgba(255, 170, 0, 0.6);
            background-size: 200% 200%;
        }

        @keyframes subtleGlow {
            0%, 100% {
                box-shadow: 
                    0 12px 35px rgba(0, 0, 0, 0.4),
                    0 0 0 2px rgba(255, 170, 0, 0.3),
                    0 0 30px rgba(255, 170, 0, 0.3);
            }
            50% {
                box-shadow: 
                    0 12px 35px rgba(0, 0, 0, 0.4),
                    0 0 0 2px rgba(255, 170, 0, 0.5),
                    0 0 40px rgba(255, 170, 0, 0.5);
            }
        }

        .user-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 25px 50px rgba(255, 170, 0, 0.4),
                0 0 60px rgba(255, 170, 0, 0.4),
                0 0 0 3px rgba(255, 170, 0, 0.6);
            background: linear-gradient(135deg, #fbff00 0%, #ffaa00 50%, #fbff00 100%);
        }

        .admin-button:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 
                0 25px 50px rgba(255, 170, 0, 0.3),
                0 0 60px rgba(255, 170, 0, 0.3),
                0 0 0 3px rgba(255, 170, 0, 0.8);
            background: linear-gradient(135deg, rgba(251, 255, 0, 1) 0%, rgba(255, 170, 0, 1) 50%, rgba(251, 255, 0, 1) 100%);
            color: #000000;
        }

        .button:active {
            transform: translateY(-5px) scale(1.02);
        }

        /* Enhanced Animations */
        @keyframes fadeZoomIn {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(40px);
                filter: blur(15px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 25px rgba(255, 170, 0, 0.6);
            }
            50% {
                text-shadow: 
                    0 0 35px rgba(255, 170, 0, 0.9), 
                    0 0 50px rgba(255, 170, 0, 0.4),
                    0 0 70px rgba(255, 170, 0, 0.2);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.01);
            }
        }

        @keyframes buttonEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .eli {
            animation: fadeZoomIn 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        .ela {
            animation: 
                fadeZoomIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.7s both,
                glow 4s ease-in-out 2.5s infinite;
        }

        .button-container {
            animation: fadeZoomIn 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.4s both;
        }

        .user-button {
            animation: 
                buttonEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.6s both,
                subtleGlow 3s ease-in-out 3s infinite;
        }

        .admin-button {
            animation: buttonEntrance 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.8s both;
        }

        .content-wrapper {
            animation: 
                fadeZoomIn 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0s both,
                pulse 8s ease-in-out 4s infinite;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 40px 25px;
                margin: 20px;
            }
            
            .eli {
                font-size: 1.3rem;
                letter-spacing: 3px;
                margin-bottom: 15px;
            }
            
            .ela {
                font-size: 4rem;
                margin: 25px 0 35px 0;
            }
            
            .button-container {
                gap: 20px;
                margin-top: 35px;
            }
            
            .button {
                padding: 18px 35px;
                font-size: 16px;
                min-width: 180px;
            }
        }

        @media (max-width: 480px) {
            .content-wrapper {
                padding: 30px 20px;
            }
            
            .ela {
                font-size: 3rem;
                flex-direction: column;
                gap: 8px;
            }
            
            .shop, .izzy {
                margin: 0;
            }
            
            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .button {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Loading animation for buttons */
        .button.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .button.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Background Video Layer -->
    <video autoplay muted loop id="bg-video">
        <source src="videos/background vid.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Animated Background Particles -->
    <div class="bg-particles"></div>

    <!-- Glass Overlay -->
    <div class="glass-overlay"></div>

    <div class="content-wrapper">
        <h2 class="eli">Welcome To</h2>
        <h1 class="ela">
            <span class="shop">Shop</span><span class="izzy">Izzy</span>
        </h1>

        <div class="button-container">
            <button class="button user-button" onclick="handleLogin('user')">Login as User</button>
            <button class="button admin-button" onclick="handleLogin('admin')">Login as Admin</button>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Random position
            particle.style.left = Math.random() * 100 + '%';
            
            // Random animation duration
            particle.style.animationDuration = (Math.random() * 15 + 8) + 's';
            
            // Random delay
            particle.style.animationDelay = Math.random() * 3 + 's';
            
            // Random size
            const size = Math.random() * 2 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            document.querySelector('.bg-particles').appendChild(particle);
            
            // Remove particle after animation
            setTimeout(() => {
                particle.remove();
            }, 25000);
        }

        // Create particles continuously
        setInterval(createParticle, 400);

        // Create initial particles
        for (let i = 0; i < 15; i++) {
            setTimeout(createParticle, i * 150);
        }

        // Enhanced mouse movement effect
        document.addEventListener('mousemove', (e) => {
            const contentWrapper = document.querySelector('.content-wrapper');
            const { clientX, clientY } = e;
            const x = (clientX / window.innerWidth - 0.5) * 15;
            const y = (clientY / window.innerHeight - 0.5) * 15;
            
            contentWrapper.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Reset position when mouse leaves
        document.addEventListener('mouseleave', () => {
            const contentWrapper = document.querySelector('.content-wrapper');
            contentWrapper.style.transform = 'translate(0, 0)';
        });

        // Enhanced login function with loading state
        function handleLogin(type) {
            const button = event.target;
            button.classList.add('loading');
            button.textContent = 'Loading...';
            
            // Simulate loading for better UX
            setTimeout(() => {
                if (type === 'user') {
                    location.href = 'login.html';
                } else {
                    location.href = 'admin_login.html';
                }
            }, 800);
        }

        // Add subtle keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') {
                handleLogin('user');
            } else if (e.key === '2') {
                handleLogin('admin');
            }
        });
    </script>
</body>
</html>
